<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Beacon House Catering</title>
  <link rel="canonical" href="https://beaconhousecatering.org/gallery">
  <meta name="description" content="Browse photos of Beacon House Catering's kitchen, meals, and events. See our culinary team in action and get inspired for your next catering event.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="gallery.css">
  <link rel="stylesheet" href="footer.css">
  <link rel="preload" as="image" href="images/compressedGallery.webp" fetchpriority="high">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="BH Catering" />
<link rel="manifest" href="/site.webmanifest" />
</head>
<body>
  <header class="main-header">
    <div class="logo-section">
      <img src="images/catering services  (2).png" alt="Beacon House Catering Logo" class="logo" onclick="window.location.href='/'" style="cursor: pointer;">
    </div>
    
    <button class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </button>
    
    <nav class="menu" id='menu'>
      <a href="services">SERVICES</a>
      <a href="gallery">GALLERY</a>
      <a href="about">ABOUT</a>
    </nav>
      
    <button class="request-btn">REQUEST CATERING</button>
  </header>

  <!-- Gallery Hero Banner -->
  <section class="gallery-hero-banner">
    <div class="about-hero-overlay"></div>
    <div class="gallery-hero-content">
      <h1>Gallery</h1>
    </div>
  </section>

  <p class="gallery-intro-text">Take a look at our kitchen, creations, and past events!</p>

  <!-- Full Gallery -->
  <section class="gallery-section">

    <!-- Kitchen -->
    <div class="gallery-category">
      <h2 class="gallery-category-title">Kitchen</h2>
      <div class="gallery-grid">
        <div class="gallery-item">
          <img src="images/bh-kitchen.jpg" alt="Kitchen">
        </div>
        <div class="gallery-item">
          <img src="images/Team Plating.jpg" alt="Team Plating">
        </div>
        <div class="gallery-item">
          <img src="images/Team Prepping.jpg" alt="Team Prepping">
        </div>
        <div class="gallery-item">
          <img src="images/Catering Bread Prep.jpg" alt="Bread Prep">
        </div>
        <div class="gallery-item">
          <img src="images/Focaccia Bread.jpg" alt="Focaccia Bread">
        </div>
        <div class="gallery-item">
          <img src="images/Lemon Tartlet.jpg" alt="Lemon Tartlet">
        </div>
        <div class="gallery-item">
          <img src="images/Corn Bread Cookies.jpg" alt="Corn Bread Cookies">
        </div>
        <div class="gallery-item">
          <img src="images/Salad.jpg" alt="Salad">
        </div>
        <div class="gallery-item">
          <img src="images/Cookie Prep.jpg" alt="Cookie Prep">
        </div>
      </div>
    </div>

    <!-- Meals -->
    <div class="gallery-category">
      <h2 class="gallery-category-title">Meals</h2>
      <div class="gallery-grid">
        <div class="gallery-item">
          <img src="images/food1.jpg" alt="Personal Catering Dish">
        </div>
        <div class="gallery-item">
          <img src="images/food2.jpg" alt="Personal Catering Dish">
        </div>
        <div class="gallery-item">
          <img src="images/food3.jpg" alt="Duck Leg">
        </div>
        <div class="gallery-item">
          <img src="images/food4.jpg" alt="Chicken Roulada">
        </div>
        <div class="gallery-item">
          <img src="images/food5.jpg" alt="Pork Chop">
        </div>
        <div class="gallery-item">
          <img src="images/food6.jpg" alt="Beef Tartar">
        </div>
        <div class="gallery-item">
          <img src="images/food7.jpg" alt="Personal Catering Meal">
        </div>
        <div class="gallery-item">
          <img src="images/food9.jpg" alt="Pecan Bar">
        </div>
        <div class="gallery-item">
          <img src="images/Oreo Cheese Cake.jpg" alt="Oreo Cheese Cake">
        </div>
      </div>
    </div>

    <!-- Events -->
    <div class="gallery-category">
      <h2 class="gallery-category-title">Events</h2>
      <div class="gallery-grid">
        <div class="gallery-item">
          <img src="images/43.jpeg" alt="Table Display">
        </div>
        <div class="gallery-item">
          <img src="images/42-scaled.jpeg" alt="Table Display">
        </div>
        <div class="gallery-item">
          <img src="images/Picnic Catering Event.jpg" alt="Picnic Catering Event">
        </div>
        <div class="gallery-item">
          <img src="images/16.jpeg" alt="Picnic Catering Event">
        </div>
        <div class="gallery-item">
          <img src="images/IMG_0018.jpg" alt="Library Catering Event">
        </div>
        <div class="gallery-item">
          <img src="images/privateEvent.jpg" alt="Private Event">
        </div>
        <div class="gallery-item">
          <img src="images/IMG_0005.jpg" alt="Library Catering Event">
        </div>
        <div class="gallery-item">
          <img src="images/Wedding Dessert Table.jpg" alt="Wedding Dessert Table">
        </div>
        <div class="gallery-item">
          <img src="images/Table Image.jpg" alt="Table Display">
        </div>
      </div>
    </div>

  </section>

  <!-- Bottom Message -->
  <section class="gallery-bottom-message">
    <p>To book an event now, click below, or to learn more about us and our mission, view about us.</p>
    <div class="gallery-bottom-buttons">
      <button class="about-text-btn" onclick="window.location.href='/#contact'">Request Catering</button>
      <button class="about-text-btn secondary-btn" onclick="window.location.href='about'">About Us</button>
    </div>
  </section>

  <script src="script.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
