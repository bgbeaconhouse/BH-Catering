  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Contact - Beacon House Catering</title>
   <meta name="description" content="Contact Beacon House Catering with questions about our catering services in San Pedro, CA. Reach out directly before submitting a catering request.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="contact.css">
  <link rel="stylesheet" href="footer.css">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="BH Catering" />
<link rel="manifest" href="/site.webmanifest" />
</head>
<body>
  <header class="main-header">
    <div class="logo-section">
      <img src="images/catering services  (2).png" alt="Beacon House Catering Logo" class="logo" onclick="window.location.href='/'" style="cursor: pointer;">
    </div>
    
    <button class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </button>
    
    <nav class="menu" id='menu'>
      <a href="services">SERVICES</a>
      <a href="gallery">GALLERY</a>
      <a href="about">ABOUT</a>
    </nav>
      
    <button class="request-btn">REQUEST CATERING</button>
  </header>

  <!-- Contact Hero Banner -->
  <section class="contact-hero-banner">
    <div class="about-hero-overlay"></div>
  </section>

  <h2 class="section-title">Contact Us</h2>

  <p class="contact-intro-text">Have questions before you fill out our catering request form? Reach out directly below.</p>

  <!-- Contact Form Section -->
  <section class="contact-form-section">
    <div class="contact-form-container">
      <form class="contact-form">
        <div class="form-group">
          <input type="text" id="name" name="name" placeholder="Name" required>
        </div>
        
        <div class="form-group">
          <input type="email" id="email" name="email" placeholder="Email" required>
        </div>
        
        <div class="form-group">
          <input type="tel" id="phone" name="phone" placeholder="Phone Number">
        </div>
        
        <div class="form-group">
          <textarea id="message" name="message" rows="6" placeholder="Message" required></textarea>
        </div>
        
        <button type="submit" class="contact-submit-btn">Send Message</button>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
